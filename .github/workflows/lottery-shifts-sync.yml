name: Mercury POS Lottery Shift Sync

on:
  schedule:
    - cron: '30 11 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run lottery shift sync
        env:
          STORE_TEXACO_USERNAME: ${{ secrets.STORE_TEXACO_USERNAME }}
          STORE_TEXACO_PASSWORD: ${{ secrets.STORE_TEXACO_PASSWORD }}
          STORE_DALTON_USERNAME: ${{ secrets.STORE_DALTON_USERNAME }}
          STORE_DALTON_PASSWORD: ${{ secrets.STORE_DALTON_PASSWORD }}
          STORE_ROME_USERNAME: ${{ secrets.STORE_ROME_USERNAME }}
          STORE_ROME_PASSWORD: ${{ secrets.STORE_ROME_PASSWORD }}
          STORE_CARNESVILLE_USERNAME: ${{ secrets.STORE_CARNESVILLE_USERNAME }}
          STORE_CARNESVILLE_PASSWORD: ${{ secrets.STORE_CARNESVILLE_PASSWORD }}
        run: python -u sync_lottery_shifts.py

      - name: Upload debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lottery-shift-sync-debug
          path: |
            *.png
            *.html
            *.txt
            *.json
