name: Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run automation
        env:
          STORE_TEXACO_USERNAME: ${{ secrets.STORE_TEXACO_USERNAME }}
          STORE_TEXACO_PASSWORD: ${{ secrets.STORE_TEXACO_PASSWORD }}
          STORE_DALTON_USERNAME: ${{ secrets.STORE_DALTON_USERNAME }}
          STORE_DALTON_PASSWORD: ${{ secrets.STORE_DALTON_PASSWORD }}
          STORE_ROME_USERNAME: ${{ secrets.STORE_ROME_USERNAME }}
          STORE_ROME_PASSWORD: ${{ secrets.STORE_ROME_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: python -u main.py

      - name: Upload debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mercury-debug
          path: |
            *.png
            *.html
            *.txt
