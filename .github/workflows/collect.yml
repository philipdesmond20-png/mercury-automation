name: Mercury POS Daily Collection

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Run collector
        env:
          STORE_TEXACO_USERNAME:  ${{ secrets.STORE_TEXACO_USERNAME }}
          STORE_TEXACO_PASSWORD:  ${{ secrets.STORE_TEXACO_PASSWORD }}
          STORE_DALTON_USERNAME:  ${{ secrets.STORE_DALTON_USERNAME }}
          STORE_DALTON_PASSWORD:  ${{ secrets.STORE_DALTON_PASSWORD }}
          STORE_ROME_USERNAME:    ${{ secrets.STORE_ROME_USERNAME }}
          STORE_ROME_PASSWORD:    ${{ secrets.STORE_ROME_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          APPS_SCRIPT_URL:        ${{ secrets.APPS_SCRIPT_URL }}
        run: python main.py

      - name: Commit data files to repo
        run: |
          git config user.name "mercury-bot"
          git config user.email "bot@mercury"
          git add data/
          git diff --staged --quiet || git commit -m "data: $(date +%Y-%m-%d)"
          git push
