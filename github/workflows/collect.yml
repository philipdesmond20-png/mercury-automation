name: Mercury POS Daily Collection

on:
  schedule:
    - cron: '0 12 * * *'  # 8am ET daily
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright gspread google-auth requests

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run collector
        env:
          STORE_TEXACO_USERNAME:  ${{ secrets.STORE_TEXACO_USERNAME }}
          STORE_TEXACO_PASSWORD:  ${{ secrets.STORE_TEXACO_PASSWORD }}
          STORE_DALTON_USERNAME:  ${{ secrets.STORE_DALTON_USERNAME }}
          STORE_DALTON_PASSWORD:  ${{ secrets.STORE_DALTON_PASSWORD }}
          STORE_ROME_USERNAME:    ${{ secrets.STORE_ROME_USERNAME }}
          STORE_ROME_PASSWORD:    ${{ secrets.STORE_ROME_PASSWORD }}
        run: python collect.py

      - name: Upload database
        uses: actions/upload-artifact@v4
        with:
          name: mercury-db
          path: mercury.db
          retention-days: 30
